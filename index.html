<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Python Cookbook — From Zero to Job-Ready</title>
<meta name="description" content="An interactive, memory-science-based Python cookbook that takes you from absolute beginner to job-ready across automation, analytics, and AI/ML." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6efe4;
    --bg-panel: #fbf6ec;
    --bg-raised: #ffffff;
    --ink: #2a2420;
    --ink-soft: #5c524a;
    --ink-faint: #8a7f73;
    --rule: #e4d8c4;
    --rule-soft: #efe6d3;
    --terra: #c85a2e;
    --terra-soft: #e8a489;
    --forest: #3d6b4a;
    --forest-soft: #8fb197;
    --gold: #c89f3d;
    --code-bg: #2a2420;
    --code-ink: #f4ead8;
    --code-keyword: #e8a489;
    --code-string: #c9d8a8;
    --code-comment: #8a7f73;
    --code-number: #e8c179;
    --shadow-sm: 0 1px 2px rgba(42, 36, 32, 0.08);
    --shadow-md: 0 4px 12px rgba(42, 36, 32, 0.08), 0 1px 3px rgba(42, 36, 32, 0.06);
    --shadow-lg: 0 12px 32px rgba(42, 36, 32, 0.12), 0 2px 8px rgba(42, 36, 32, 0.06);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Fraunces', Georgia, serif;
    --font-ui: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius-sm: 4px;
    --radius: 8px;
    --radius-lg: 14px;
  }
  [data-theme="dark"] {
    --bg: #1a1612;
    --bg-panel: #221d18;
    --bg-raised: #2a2420;
    --ink: #f4ead8;
    --ink-soft: #c9bfae;
    --ink-faint: #8a7f73;
    --rule: #3a332b;
    --rule-soft: #2f2923;
    --terra: #e8a489;
    --terra-soft: #c85a2e;
    --forest: #8fb197;
    --forest-soft: #3d6b4a;
    --gold: #e8c179;
    --code-bg: #0f0c09;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font-body); font-size: 17px; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02", "liga";
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200, 90, 46, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(61, 107, 74, 0.03) 0%, transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.4; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  [data-theme="dark"] body::before { opacity: 0.25; }

  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; position: relative; z-index: 1; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-panel); border-right: 1px solid var(--rule);
    padding: 32px 24px; position: sticky; top: 0; height: 100vh;
    overflow-y: auto; font-family: var(--font-ui); font-size: 14px;
  }
  .brand { font-family: var(--font-display); font-weight: 600; font-size: 26px;
    line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 4px; color: var(--ink); }
  .brand em { font-style: italic; color: var(--terra); font-weight: 500; }
  .brand-sub { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--ink-faint); margin-bottom: 28px; }

  .progress-card { background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: var(--rule-soft); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--terra), var(--gold));
    border-radius: 3px; transition: width 0.4s ease; }
  .streak { margin-top: 10px; font-size: 12px; color: var(--ink-soft);
    display: flex; align-items: center; gap: 6px; }

  .nav-search { width: 100%; padding: 8px 12px; border: 1px solid var(--rule);
    border-radius: var(--radius-sm); background: var(--bg-raised); color: var(--ink);
    font-family: var(--font-ui); font-size: 13px; margin-bottom: 20px; }
  .nav-search:focus { outline: 2px solid var(--terra-soft); outline-offset: 1px; }

  .part-group { margin-bottom: 20px; }
  .part-title { font-family: var(--font-display); font-size: 13px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--terra);
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--rule); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px;
    margin: 2px -10px; border-radius: var(--radius-sm); color: var(--ink-soft);
    cursor: pointer; text-decoration: none; font-size: 13.5px; line-height: 1.35;
    transition: background 0.15s, color 0.15s; }
  .nav-item:hover { background: var(--rule-soft); color: var(--ink); }
  .nav-item.active { background: var(--terra); color: #fff; font-weight: 500; }
  .nav-item.active .check { border-color: rgba(255,255,255,0.5); }
  .check { width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--rule); display: inline-flex; align-items: center;
    justify-content: center; font-size: 10px; flex-shrink: 0; }
  .check.done { background: var(--forest); border-color: var(--forest); color: white; }
  .nav-time { margin-left: auto; font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .nav-item.active .nav-time { color: rgba(255,255,255,0.7); }

  .sidebar-footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--rule);
    display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-mini { padding: 6px 10px; background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: var(--radius-sm); color: var(--ink-soft); font-family: var(--font-ui);
    font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-mini:hover { background: var(--terra); color: white; border-color: var(--terra); }

  /* Main */
  .main { padding: 60px 8vw 120px; max-width: 880px; width: 100%; margin: 0 auto; }

  /* TOC / Hero */
  .hero { margin-bottom: 56px; padding-bottom: 40px; border-bottom: 1px solid var(--rule); }
  .hero-eyebrow { font-family: var(--font-ui); font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--terra); margin-bottom: 16px; }
  .hero-title { font-family: var(--font-display); font-size: clamp(42px, 6vw, 72px);
    line-height: 1.02; font-weight: 500; letter-spacing: -0.03em; margin: 0 0 20px; }
  .hero-title em { font-style: italic; font-weight: 400; color: var(--terra); }
  .hero-lede { font-size: 20px; line-height: 1.5; color: var(--ink-soft); max-width: 60ch; margin: 0 0 32px; }
  .pace-box { background: var(--bg-panel); border: 1px solid var(--rule);
    border-left: 4px solid var(--terra); border-radius: var(--radius);
    padding: 24px 28px; font-family: var(--font-ui); font-size: 15px; }
  .pace-box h3 { font-family: var(--font-display); font-size: 22px; margin: 0 0 12px;
    color: var(--ink); font-weight: 600; }
  .pace-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-top: 16px; }
  .pace-card { background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: var(--radius-sm); padding: 14px 16px; }
  .pace-card strong { display: block; font-family: var(--font-display); color: var(--terra);
    font-size: 24px; font-weight: 600; }
  .pace-card span { color: var(--ink-soft); font-size: 13px; }

  .toc-part { margin-bottom: 40px; }
  .toc-part-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1px solid var(--rule); }
  .toc-part-num { font-family: var(--font-display); font-style: italic; font-weight: 400;
    color: var(--terra); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }
  .toc-part-title { font-family: var(--font-display); font-size: 28px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--ink); margin: 0; }
  .toc-part-time { margin-left: auto; font-family: var(--font-ui); font-size: 12px;
    color: var(--ink-faint); letter-spacing: 0.05em; }
  .toc-row { display: grid; grid-template-columns: 24px 1fr auto; gap: 16px;
    padding: 10px 0; border-bottom: 1px dotted var(--rule-soft); cursor: pointer;
    font-family: var(--font-ui); font-size: 15px; color: var(--ink-soft);
    align-items: center; transition: color 0.15s, padding-left 0.15s; text-decoration: none; }
  .toc-row:last-child { border-bottom: none; }
  .toc-row:hover { color: var(--terra); padding-left: 6px; }
  .toc-dot { width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--rule); display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; }
  .toc-dot.done { background: var(--forest); border-color: var(--forest); color: white; }
  .toc-time { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--ink-faint); }

  /* Module view */
  .module-header { margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--rule); }
  .module-crumb { font-family: var(--font-ui); font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--terra); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px; }
  .module-crumb a { color: var(--ink-faint); text-decoration: none; transition: color 0.15s; }
  .module-crumb a:hover { color: var(--terra); }
  .module-title { font-family: var(--font-display); font-size: clamp(34px, 5vw, 52px);
    font-weight: 500; line-height: 1.08; letter-spacing: -0.025em; margin: 0 0 16px; color: var(--ink); }
  .module-title em { font-style: italic; color: var(--terra); font-weight: 400; }
  .module-meta { font-family: var(--font-ui); font-size: 13px; color: var(--ink-faint);
    display: flex; gap: 20px; flex-wrap: wrap; }
  .module-meta span { display: flex; align-items: center; gap: 6px; }

  .step { margin: 48px 0; scroll-margin-top: 20px; }
  .step-num { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
  .step-title { font-family: var(--font-display); font-size: 26px; font-weight: 600;
    letter-spacing: -0.015em; line-height: 1.15; margin: 0 0 20px; color: var(--ink);
    display: flex; align-items: baseline; gap: 12px; }
  .step-emoji { font-size: 24px; flex-shrink: 0; line-height: 1; }
  .step p { margin: 0 0 16px; }
  .step p:last-child { margin-bottom: 0; }
  .step code { background: var(--rule-soft); padding: 1px 6px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 0.88em; }
  [data-theme="dark"] .step code { background: var(--rule); }

  .analogy { background: linear-gradient(135deg, rgba(200, 90, 46, 0.06), rgba(200, 159, 61, 0.06));
    border-left: 4px solid var(--terra); padding: 24px 28px; border-radius: var(--radius);
    font-size: 17px; line-height: 1.6; color: var(--ink); }

  .code-block { background: var(--code-bg); color: var(--code-ink); border-radius: var(--radius);
    padding: 20px 24px; font-family: var(--font-mono); font-size: 13.5px; line-height: 1.7;
    overflow-x: auto; margin: 20px 0; box-shadow: var(--shadow-md); }
  .code-block pre { margin: 0; white-space: pre; }
  .code-header { display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(244, 234, 216, 0.1); }
  .copy-btn { background: transparent; border: 1px solid rgba(244, 234, 216, 0.2);
    color: var(--code-ink); font-family: var(--font-ui); font-size: 11px;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; letter-spacing: 0.05em;
    transition: all 0.15s; }
  .copy-btn:hover { background: var(--terra); border-color: var(--terra); color: white; }
  .code-output { background: var(--bg-panel); border: 1px solid var(--rule);
    border-left: 3px solid var(--forest); border-radius: var(--radius-sm);
    padding: 12px 18px; font-family: var(--font-mono); font-size: 13px;
    color: var(--ink); margin: -8px 0 20px; white-space: pre-wrap; }
  .code-output::before { content: "Output: "; color: var(--forest); font-weight: 700;
    font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; margin-right: 8px; }

  .narrate { background: var(--bg-panel); border: 1px solid var(--rule);
    border-radius: var(--radius); padding: 4px 0; margin: 20px 0; }
  .narrate-row { display: grid; grid-template-columns: minmax(200px, 1fr) 1.5fr;
    gap: 20px; padding: 14px 20px; border-bottom: 1px solid var(--rule-soft);
    align-items: center; }
  .narrate-row:last-child { border-bottom: none; }
  .narrate-code { font-family: var(--font-mono); font-size: 13px;
    background: var(--code-bg); color: var(--code-ink);
    padding: 8px 12px; border-radius: var(--radius-sm); white-space: pre; overflow-x: auto; }
  .narrate-text { color: var(--ink-soft); font-family: var(--font-ui); font-size: 14px; line-height: 1.5; }

  .predict { background: var(--bg-panel); border: 2px dashed var(--forest);
    border-radius: var(--radius); padding: 24px 28px; margin: 20px 0; }
  .predict-label { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--forest); margin-bottom: 8px; font-weight: 600; }
  .predict-q { font-family: var(--font-display); font-size: 18px; font-weight: 500;
    margin: 0 0 16px; color: var(--ink); }
  .predict-code { font-family: var(--font-mono); background: var(--code-bg);
    color: var(--code-ink); padding: 14px 18px; border-radius: var(--radius-sm);
    font-size: 13px; margin: 12px 0 16px; line-height: 1.7; white-space: pre-wrap; }
  .predict-input { width: 100%; padding: 10px 14px; font-family: var(--font-mono);
    font-size: 14px; border: 1px solid var(--rule); border-radius: var(--radius-sm);
    background: var(--bg-raised); color: var(--ink); margin-bottom: 12px; }
  .predict-input:focus { outline: 2px solid var(--forest-soft); outline-offset: 1px; }
  .predict-actions { display: flex; gap: 10px; }
  .btn-primary, .btn-secondary { font-family: var(--font-ui); font-size: 14px;
    font-weight: 500; padding: 10px 18px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--forest); color: white; }
  .btn-primary:hover { background: #2c5239; transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1px solid var(--rule); }
  .btn-secondary:hover { background: var(--rule-soft); color: var(--ink); }
  .reveal { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--rule); display: none; }
  .reveal.open { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .reveal-label { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--terra); font-weight: 600; margin-bottom: 8px; }

  .tracks { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px; margin: 20px 0; }
  .track-card { background: var(--bg-panel); border: 1px solid var(--rule);
    border-radius: var(--radius); padding: 20px; transition: transform 0.15s, box-shadow 0.15s; }
  .track-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .track-card.automation { border-top: 3px solid #3d6b4a; }
  .track-card.analytics { border-top: 3px solid #c89f3d; }
  .track-card.ai { border-top: 3px solid #c85a2e; }
  .track-icon { font-size: 24px; margin-bottom: 8px; }
  .track-title { font-family: var(--font-display); font-size: 17px; font-weight: 600;
    margin: 0 0 8px; color: var(--ink); }
  .track-body { font-family: var(--font-ui); font-size: 13.5px; color: var(--ink-soft);
    line-height: 1.5; margin: 0; }

  .traps { background: rgba(200, 90, 46, 0.05); border-left: 4px solid var(--terra);
    border-radius: var(--radius); padding: 4px 0; margin: 20px 0; }
  .trap { padding: 14px 24px; border-bottom: 1px solid var(--rule-soft); }
  .trap:last-child { border-bottom: none; }
  .trap-title { font-family: var(--font-display); font-weight: 600; font-size: 15px;
    margin: 0 0 6px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .trap-body { font-family: var(--font-ui); font-size: 14px; color: var(--ink-soft);
    margin: 0; line-height: 1.55; }

  details.problem { background: var(--bg-panel); border: 1px solid var(--rule);
    border-radius: var(--radius); padding: 0; margin: 14px 0; overflow: hidden; }
  details.problem > summary { padding: 14px 22px; cursor: pointer;
    font-family: var(--font-ui); font-weight: 500; font-size: 15px;
    display: flex; align-items: center; gap: 12px; list-style: none; color: var(--ink); }
  details.problem > summary::-webkit-details-marker { display: none; }
  details.problem > summary::after { content: "+"; margin-left: auto; font-size: 20px;
    color: var(--ink-faint); font-family: var(--font-display); transition: transform 0.2s; }
  details.problem[open] > summary::after { content: "−"; }
  details.problem[open] > summary { border-bottom: 1px solid var(--rule); }
  .difficulty { font-family: var(--font-ui); font-size: 11px; padding: 3px 10px;
    border-radius: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .difficulty.easy { background: rgba(61, 107, 74, 0.15); color: var(--forest); }
  .difficulty.medium { background: rgba(200, 159, 61, 0.15); color: #8a6d1a; }
  .difficulty.hard { background: rgba(200, 90, 46, 0.15); color: var(--terra); }
  [data-theme="dark"] .difficulty.medium { color: var(--gold); }
  .problem-body { padding: 18px 22px; }
  .problem-body p { margin: 0 0 12px; font-family: var(--font-ui); font-size: 14.5px; line-height: 1.5; }
  .hint { background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: var(--radius-sm); margin-top: 10px; overflow: hidden; }
  .hint summary { padding: 10px 16px; font-family: var(--font-ui); font-size: 13px;
    font-weight: 500; cursor: pointer; color: var(--terra); list-style: none; }
  .hint summary::-webkit-details-marker { display: none; }
  .hint summary::before { content: "💡 "; }
  .hint[open] summary { border-bottom: 1px solid var(--rule); }
  .hint-body { padding: 12px 16px; font-family: var(--font-ui); font-size: 13.5px;
    color: var(--ink-soft); line-height: 1.55; }
  .hint-body pre { background: var(--code-bg); color: var(--code-ink);
    padding: 10px 14px; border-radius: var(--radius-sm); margin: 6px 0;
    font-family: var(--font-mono); font-size: 13px; overflow-x: auto; white-space: pre; }

  .recall { background: linear-gradient(135deg, rgba(61, 107, 74, 0.08), rgba(200, 159, 61, 0.05));
    border-radius: var(--radius); padding: 28px 32px; margin: 40px 0;
    border: 1px solid var(--forest-soft); }
  .recall-title { font-family: var(--font-display); font-size: 22px; font-weight: 600;
    margin: 0 0 6px; color: var(--forest); display: flex; align-items: center; gap: 10px; }
  .recall-sub { font-family: var(--font-ui); font-size: 13px; color: var(--ink-soft); margin-bottom: 20px; }
  .recall-q { background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: var(--radius-sm); padding: 16px 20px; margin: 12px 0; }
  .recall-q-text { font-family: var(--font-display); font-size: 17px; font-weight: 500;
    margin: 0 0 8px; color: var(--ink); }
  .recall-tag { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .recall-a { font-family: var(--font-ui); font-size: 14px; color: var(--ink-soft);
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--rule);
    display: none; line-height: 1.55; }
  .recall-a.open { display: block; }

const MODULES_FLAT = [];
CURRICULUM.forEach(p => p.modules.forEach(m => MODULES_FLAT.push({ ...m, partNum: p.partNum, partTitle: p.partTitle })));
const TOTAL_MODULES = MODULES_FLAT.length;

/* ===================== STATE (with localStorage persistence) ===================== */
const STORAGE_KEY = 'python-cookbook-state-v1';
const STATE = {
  completed: new Set(),
  currentId: "home",
  theme: "light"
};
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed: Array.from(STATE.completed),
      theme: STATE.theme
    }));
  } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    STATE.completed = new Set(data.completed || []);
    STATE.theme = data.theme || "light";
    document.documentElement.setAttribute('data-theme', STATE.theme);
  } catch(e) {}
}

/* ===================== SYNTAX HIGHLIGHTING (lightweight) ===================== */
function highlight(code) {
  if (!code) return '';
  // Escape HTML first
  let h = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Strings (single/double/triple)
  h = h.replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|"[^"\n]*"|'[^'\n]*')/g, '<span style="color:var(--code-string)">$1</span>');
  // Comments
  h = h.replace(/(#[^\n]*)/g, '<span style="color:var(--code-comment);font-style:italic">$1</span>');
  // Keywords
  const kws = ['def','return','if','elif','else','for','while','in','not','and','or','import','from','as','class','try','except','finally','raise','with','yield','pass','break','continue','True','False','None','lambda','async','await','global','nonlocal','assert','is'];
  const kwRegex = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  h = h.replace(kwRegex, '<span style="color:var(--code-keyword);font-weight:500">$1</span>');
  // Numbers
  h = h.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:var(--code-number)">$1</span>');
  // Built-in functions (most common)
  h = h.replace(/\b(print|len|range|str|int|float|list|dict|set|tuple|type|input|open|enumerate|zip|map|filter|sorted|sum|min|max|abs|round)\b(?=\()/g, '<span style="color:#f4c26c">$1</span>');
  return h;
}
function escapeHTML(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ===================== UNIVERSAL MODULE RENDERER ===================== */
// Reads from CONTENT_ALL (a merged dict) and renders any module's HTML

function renderModuleBody(modId) {
  const c = CONTENT_ALL[modId];
  const mod = MODULES_FLAT.find(m => m.id === modId);
  if (!c || !mod) return renderScaffold(modId);

  const idx = MODULES_FLAT.findIndex(m => m.id === modId);
  const prev = idx > 0 ? MODULES_FLAT[idx - 1] : null;
  const next = idx < MODULES_FLAT.length - 1 ? MODULES_FLAT[idx + 1] : null;

  const blocks = [];

  // Header
  blocks.push(`
    <div class="module-header">
      <div class="module-crumb"><a href="#" data-nav="home">Contents</a> <span>›</span> <span>${mod.partNum} · ${mod.partTitle}</span></div>
      <h1 class="module-title">${mod.title}</h1>
      <div class="module-meta">
        <span>⏱ ${mod.time} min</span>
        <span>📍 Module ${mod.id}</span>
      </div>
    </div>
  `);

  // 1. Goal
  if (c.goal) blocks.push(`
    <section class="step">
      <h2 class="step-title"><span class="step-emoji">🎯</span> What you'll be able to do</h2>
      <p style="font-size: 17px; color: var(--ink);">${c.goal}</p>

  // 2. Analogy
  if (c.analogy) blocks.push(`
    <section class="step">
      <h2 class="step-title"><span class="step-emoji">🧠</span> The everyday analogy</h2>
      <div class="analogy"><p style="margin:0;">${c.analogy}</p></div>
    </section>
  `);

  // 3. Plain English
  if (c.plain) blocks.push(`
    <section class="step">
      <h2 class="step-title"><span class="step-emoji">📖</span> The concept in plain English</h2>
      <p>${c.plain}</p>
    </section>
  `);

  // Terms (if provided — used in 0.1)
  if (c.terms) {
    const rows = c.terms.map(([term, def]) => `<strong>${term}</strong><div>${def}</div>`).join('');
    blocks.push(`
      <section class="step">
        <h2 class="step-title"><span class="step-emoji">🔤</span> The proper names</h2>
        <p>Don't memorize — we'll revisit these many times.</p>
        <div class="terms-grid">${rows}</div>
      </section>
    `);
  }

  // 4. Code with narration
  if (c.code) {
    let block = `
      <section class="step">
        <h2 class="step-title"><span class="step-emoji">👀</span> Watch me do it</h2>
        <div class="code-block">
          <div class="code-header"><span>example.py</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
          <pre>${highlight(c.code)}</pre>
        </div>`;
    if (c.codeOutput) block += `<div class="code-output">${escapeHTML(c.codeOutput)}</div>`;
    if (c.codeNarrate) {
      block += `<div class="narrate">`;
      c.codeNarrate.forEach(([code, text]) => {
        block += `<div class="narrate-row"><div class="narrate-code">${escapeHTML(code)}</div><div class="narrate-text">${text}</div></div>`;
      });
      block += `</div>`;
    }
    block += `</section>`;
    blocks.push(block);
  }

  // Multi-step content (used in 0.3, 4.5, 6.x, 7.x)
  if (c.steps) {
    let block = `<section class="step"><h2 class="step-title"><span class="step-emoji">🛠</span> Step-by-step</h2><div class="step-list">`;
    c.steps.forEach(s => {
      const body = (s.code) ? `<pre style="background:var(--code-bg);color:var(--code-ink);padding:12px 16px;border-radius:4px;margin:8px 0 0;overflow-x:auto;font-family:var(--font-mono);font-size:13px;">${highlight(s.code)}</pre>` : (s.body || '');
      block += `<div class="step-list-item"><strong>${s.title}</strong>${body}</div>`;
    });
    block += `</div></section>`;
    blocks.push(block);
  }

  // Pillars (used in 6.x)
  if (c.pillars) {
    let block = `<section class="step"><h2 class="step-title"><span class="step-emoji">🏛</span> The pillars</h2>`;
    c.pillars.forEach(p => {
      block += `<h3 style="font-family:var(--font-display);font-size:18px;color:var(--terra);margin:24px 0 8px;">${p.title}</h3>
        <div class="code-block"><div class="code-header"><span>example</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
        <pre>${highlight(p.code)}</pre></div>`;
    });
    block += `</section>`;
    blocks.push(block);
  }

  // Concepts list (used in 3.1)

  }

  // Files breakdown (used in 4.3)
  if (c.files) {
    const rows = c.files.map(([term, def]) => `<strong>${term}</strong><div>${def}</div>`).join('');
    blocks.push(`<section class="step"><h2 class="step-title"><span class="step-emoji">📁</span> File-by-file</h2><div class="terms-grid">${rows}</div></section>`);
  }

  // Pyproject breakdown (used in 4.5)
  if (c.pyprojectBreakdown) {
    blocks.push(`<section class="step"><h2 class="step-title"><span class="step-emoji">⚙️</span> pyproject.toml line-by-line</h2>
      <div class="code-block"><div class="code-header"><span>pyproject.toml</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
      <pre>${highlight(c.pyprojectBreakdown)}</pre></div></section>`);
  }

  // Additional code examples
  if (c.packageExample) blocks.push(`<section class="step"><div class="code-block"><div class="code-header"><span>package layout</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${highlight(c.packageExample)}</pre></div></section>`);

  if (c.parametrize) blocks.push(`<section class="step"><h3 style="font-family:var(--font-display);font-size:20px;margin:0 0 12px;">Parametrize for many cases</h3><div class="code-block"><div class="code-header"><span>parametrize</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${highlight(c.parametrize)}</pre></div></section>`);

  if (c.readmeTemplate) blocks.push(`<section class="step"><h3 style="font-family:var(--font-display);font-size:20px;margin:0 0 12px;">README template</h3><div class="code-block"><div class="code-header"><span>README.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${escapeHTML(c.readmeTemplate)}</pre></div></section>`);
  if (c.example) blocks.push(`<section class="step"><div class="code-block"><div class="code-header"><span>example</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${escapeHTML(c.example)}</pre></div></section>`);
  if (c.realExample) blocks.push(`<section class="step"><h3 style="font-family:var(--font-display);font-size:20px;margin:0 0 12px;">Real example</h3><div class="code-block"><div class="code-header"><span>example</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${highlight(c.realExample)}</pre></div></section>`);
  if (c.debugWorkflow) blocks.push(`<section class="step"><div class="code-block"><div class="code-header"><span>workflow</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>${escapeHTML(c.debugWorkflow)}</pre></div></section>`);

  // Common errors (2.2)
  if (c.commonErrors) {

        antiPatterns: '🚫 Anti-patterns to avoid',

        checks: '🔍 What to check',

  // Questions (8.3 specifically)
  if (c.questions) {
    let block = `<section class="step"><h2 class="step-title"><span class="step-emoji">💬</span> The questions & pocket-answers</h2>`;
    c.questions.forEach(({q, a}) => {

    blocks.push(block);
  }

  // Predict
  if (c.predict) {
    blocks.push(`
      <section class="step">
        <h2 class="step-title"><span class="step-emoji">✋</span> Your turn — predict first</h2>
        <p>Predicting before reading the answer is 3x more effective than passive reading.</p>
        <div class="predict">
          <div class="predict-label">Predict the output</div>

            <button class="btn-primary" onclick="this.closest('.predict').querySelector('.reveal').classList.add('open')">Reveal</button>

  }

  // Real-world examples (3 tracks)
  if (c.realWorld) {
    blocks.push(`
      <section class="step">
        <h2 class="step-title"><span class="step-emoji">🌍</span> Three tiny real-world examples</h2>
        <div class="tracks">
          <div class="track-card automation"><div class="track-icon">🤖</div><div class="track-title">Automation</div><p class="track-body">${c.realWorld.automation}</p></div>
          <div class="track-card analytics"><div class="track-icon">📊</div><div class="track-title">Analytics</div><p class="track-body">${c.realWorld.analytics}</p></div>
          <div class="track-card ai"><div class="track-icon">🧠</div><div class="track-title">AI / ML</div><p class="track-body">${c.realWorld.ai}</p></div>
        </div>
      </section>
    `);
  }

  // Traps
  if (c.traps) {
    let block = `<section class="step"><h2 class="step-title"><span class="step-emoji">⚠️</span> Beginner traps</h2><div class="traps">`;

      block += `<div class="trap"><div class="trap-title">🪤 ${t.title}</div><p class="trap-body">${t.body}</p></div>`;
    });
    block += `</div></section>`;
    blocks.push(block);
  }

  // Practice problems
  if (c.practice) {
    let block = `<section class="step"><h2 class="step-title"><span class="step-emoji">🎮</span> Practice problems</h2><p>Don't skip these — reading about pushups doesn't make you stronger.</p>`;
    c.practice.forEach(p => {

      block += `<details class="problem"><summary><span class="difficulty ${p.level}">${p.level}</span> ${p.q}</summary>
        <div class="problem-body">
          <details class="hint" open><summary>Solution</summary><div class="hint-body"><pre>${highlight(p.solution)}</pre>${note}</div></details>
        </div></details>`;
    });
    block += `</section>`;
    blocks.push(block);
  }

  // Recall
  if (c.recall) {
    let block = `<section class="step"><div class="recall">
      <div class="recall-title">🔁 Recall checkpoint</div>
      <div class="recall-sub">Answer in your head first — click to check.</div>`;
    c.recall.forEach(r => {
      block += `<div class="recall-q">
        <div class="recall-tag">${r.tag}</div>
        <div class="recall-q-text">${r.q}</div>
        <button class="recall-toggle" onclick="toggleRecall(this)">Show answer</button>
        <div class="recall-a">${r.a}</div>
      </div>`;
    });
    block += `</div></section>`;
    blocks.push(block);
  }

  // TLDR
  if (c.tldr) blocks.push(`<section class="step"><div class="summary-line">${c.tldr}</div></section>`);

  // Interview
  if (c.interview) blocks.push(`
    <section class="step">
      <div class="interview">
        <div class="interview-label">🗣 Interview pocket-answer · 30 seconds</div>
        <div class="interview-q">"${c.interview.q}"</div>
        <p class="interview-a">${c.interview.a}</p>
      </div>
    </section>
  `);

  // Complete button
  blocks.push(`<div class="complete-bar"><button class="complete-btn ${STATE.completed.has(modId) ? 'done' : ''}" id="completeBtn" onclick="markComplete('${modId}')">${STATE.completed.has(modId) ? 'Completed ✓' : 'Mark module complete ✓'}</button></div>`);

  // Module nav
  blocks.push(`<div class="module-nav">

  </div>`);

  return blocks.join('');
}

/* ===================== NAV ===================== */
function renderNav() {
  const term = (document.getElementById('navSearch')?.value || '').toLowerCase();
  document.getElementById('nav').innerHTML = CURRICULUM.map(part => {
    const filtered = part.modules.filter(m => !term || m.title.toLowerCase().includes(term) || m.id.includes(term));
    if (!filtered.length) return '';
    return `<div class="part-group">
      <div class="part-title">${part.partNum}: ${part.partTitle}</div>
      ${filtered.map(m => `
        <a class="nav-item ${STATE.currentId === m.id ? 'active' : ''}" href="#" data-nav="${m.id}">
          <span class="check ${STATE.completed.has(m.id) ? 'done' : ''}">${STATE.completed.has(m.id) ? '✓' : ''}</span>
          <span>${m.id}  ${m.title}</span>
          <span class="nav-time">${m.time}m</span>
        </a>`).join('')}
    </div>`;
  }).join('');

  const done = STATE.completed.size;
  const pct = Math.round((done / TOTAL_MODULES) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_MODULES}`;
  document.getElementById('streakText').textContent = `${done} module${done === 1 ? '' : 's'} complete`;
}

function navigate(id) {
  STATE.currentId = id;
  if (id === 'home') {
    renderHome();
  } else {
    document.getElementById('main').innerHTML = renderModuleBody(id);
  }
  renderNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('sidebar').classList.remove('open');
}

/* ===================== INTERACTIONS ===================== */
function toggleRecall(btn) {
  const a = btn.nextElementSibling;
  a.classList.toggle('open');
  btn.textContent = a.classList.contains('open') ? 'Hide answer' : 'Show answer';
}
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('pre').innerText;
  navigator.clipboard?.writeText(code).then(() => {
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}
function markComplete(id) {
  if (STATE.completed.has(id)) {
    STATE.completed.delete(id);
  } else {
    STATE.completed.add(id);
  }
  saveState();
  navigate(id);
}

/* ===================== FLASHCARDS ===================== */
function buildFlashDeck() {
  const ids = STATE.completed.size ? Array.from(STATE.completed) : [STATE.currentId].filter(id => id !== 'home' && CONTENT_ALL[id]);
  const deck = [];
  ids.forEach(id => {
    const c = CONTENT_ALL[id];
    if (!c) return;
    if (c.tldr) deck.push({ q: `What's the one-line summary of Module ${id}?`, a: c.tldr });
    if (c.recall) c.recall.forEach(r => deck.push({ q: r.q, a: r.a }));
    if (c.interview) deck.push({ q: c.interview.q, a: c.interview.a });
  });
  return deck;
}
let FLASH = { deck: [], idx: 0, flipped: false };
function openFlash() {
  FLASH.deck = buildFlashDeck();
  FLASH.idx = 0;
  FLASH.flipped = false;
  if (!FLASH.deck.length) {
    showModal(`<div style="font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:12px;">Flashcards</div>
      <p>Open or complete a module first — flashcards are auto-built from modules you've started.</p>`);
    return;
  }
  renderFlash();
}
function renderFlash() {
  const card = FLASH.deck[FLASH.idx];
  showModal(`
    <div style="font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:4px;">Flashcards</div>
    <div class="flashcard-counter">${FLASH.idx + 1} / ${FLASH.deck.length}</div>
    <div class="flashcard" id="flashcard">
      <div class="flashcard-side">${FLASH.flipped ? 'Answer' : 'Question'}</div>
      <div class="flashcard-content">${FLASH.flipped ? card.a : card.q}</div>
      <div class="flashcard-hint">Click or press Space to flip</div>
    </div>
    <div class="flashcard-actions">
      <button class="btn-secondary" onclick="flashPrev()">← Previous</button>
      <button class="btn-primary" onclick="flashNext()">Next →</button>
    </div>
  `);
  document.getElementById('flashcard').addEventListener('click', () => { FLASH.flipped = !FLASH.flipped; renderFlash(); });
}
function flashNext() { FLASH.idx = (FLASH.idx + 1) % FLASH.deck.length; FLASH.flipped = false; renderFlash(); }
function flashPrev() { FLASH.idx = (FLASH.idx - 1 + FLASH.deck.length) % FLASH.deck.length; FLASH.flipped = false; renderFlash(); }

/* ===================== GLOSSARY ===================== */
function openGlossary() {
  const terms = [];
  Object.entries(CONTENT_ALL).forEach(([id, c]) => {
    if (c.terms) c.terms.forEach(([t, d]) => terms.push({ term: t, def: d, mod: id }));
    if (c.concepts) c.concepts.forEach(([t, d]) => terms.push({ term: t, def: d, mod: id }));
  });
  // Dedupe by term name
  const seen = new Set();
  const unique = terms.filter(t => seen.has(t.term.toLowerCase()) ? false : seen.add(t.term.toLowerCase()));
  unique.sort((a, b) => a.term.localeCompare(b.term));

  const html = `
    <div style="font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:12px;">📖 Glossary</div>
    <input type="text" class="glossary-search" id="glossarySearch" placeholder="Search terms…" />
    <div id="glossaryList">
      ${unique.map(t => `<div class="glossary-item" data-term="${t.term.toLowerCase()}">
        <div class="glossary-term">${t.term} <a href="#" data-nav="${t.mod}" style="font-size:11px;font-family:var(--font-ui);text-transform:uppercase;letter-spacing:0.1em;font-weight:500;margin-left:8px;">→ ${t.mod}</a></div>
        <p class="glossary-def">${t.def}</p>
      </div>`).join('')}
    </div>
  `;
  showModal(html);
  setTimeout(() => {
    const search = document.getElementById('glossarySearch');
    if (search) search.addEventListener('input', () => {
      const v = search.value.toLowerCase();
      document.querySelectorAll('#glossaryList .glossary-item').forEach(el => {
        el.style.display = el.dataset.term.includes(v) ? '' : 'none';
      });
    });
  }, 50);
}

function toggleTheme() {
  STATE.theme = STATE.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', STATE.theme);

function resetProgress() {

  STATE.completed.clear();

}

  plain: "The core workflow is <code>add → commit → push</code>. Repeat forever. <code>add</code> stages files (tells Git 'I want to save these changes'). <code>commit</code> makes a permanent snapshot. <code>push</code> sends it to GitHub.",

git status                    # see what's tracked / changed

from pathlib import Path

def organize(folder: Path, dry_run: bool = False) -&gt; dict:
    """Move files into subfolders named after their extension."""
    moves = {}
    for file in folder.iterdir():
        if not file.is_file() or not file.suffix:
            continue
        ext = file.suffix[1:].lower()
        target = folder / ext
        if not dry_run:
            target.mkdir(exist_ok=True)
            file.rename(target / file.name)
        moves.setdefault(ext, []).append(file.name)
    return moves

def main():
    parser = argparse.ArgumentParser()
    parser.add_argument("--folder", default="~/Downloads")
    parser.add_argument("--dry-run", action="store_true")
    args = parser.parse_args()

    folder = Path(args.folder).expanduser()
    moves = organize(folder, args.dry_run)
    for ext, files in moves.items():
        print(f"{ext}: {len(files)} file(s)")</code>` },

from sentence_transformers import SentenceTransformer
import chromadb

def chunk_text(text, size=500, overlap=50):
    """Split text into overlapping chunks."""
    chunks = []
    for i in range(0, len(text), size - overlap):
        chunks.append(text[i:i + size])
    return chunks

def ingest(pdf_path):
    # Read PDF
    reader = PdfReader(pdf_path)
    full_text = "\\n".join(page.extract_text() for page in reader.pages)

    # Chunk
    chunks = chunk_text(full_text)

    # Embed
    model = SentenceTransformer("all-MiniLM-L6-v2")
    embeddings = model.encode(chunks)

    # Store in Chroma
    client = chromadb.PersistentClient(path="./chroma_db")
    collection = client.get_or_create_collection("pdf_chunks")
    collection.add(
        documents=chunks,
        embeddings=embeddings.tolist(),
        ids=[f"chunk_{i}" for i in range(len(chunks))]
    )
    print(f"Ingested {len(chunks)} chunks")

if __name__ == "__main__":
    import sys
    ingest(sys.argv[1])</code>` },

import chromadb
from sentence_transformers import SentenceTransformer
from anthropic import Anthropic
import os

@st.cache_resource
def setup():
    model = SentenceTransformer("all-MiniLM-L6-v2")
    client = chromadb.PersistentClient(path="./chroma_db")
    collection = client.get_collection("pdf_chunks")
    llm = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
    return model, collection, llm

model, collection, llm = setup()

st.title("📄 Chat with your PDF")
question = st.text_input("Ask anything about the PDF:")

if question:
    # Find relevant chunks
    q_embedding = model.encode([question])[0].tolist()
    results = collection.query(query_embeddings=[q_embedding], n_results=3)
    context = "\\n\\n".join(results["documents"][0])

    # Ask the LLM
    prompt = f"""Answer the question using only the context below.
If the answer isn't in the context, say "I don't know."

Context:
{context}

Question: {question}"""

    response = llm.messages.create(
        model="claude-3-5-sonnet-latest",
        max_tokens=400,
        messages=[{"role": "user", "content": prompt}]
    )
    st.write(response.content[0].text)

    with st.expander("Source chunks"):
        for chunk in results["documents"][0]:
            st.text(chunk[:200] + "...")</code>` },
